robot_radius: 0.25             
inflation_radius: 0.5
obstacle_range: 1.0
raytrace_range: 6.0
observation_sources: base_lidar  head_kinect2
base_lidar: {
    data_type: LaserScan,
    topic: /scan, 
    marking: true, 
    clearing: true
    }
    
#视觉相机
head_kinect2: {
    data_type: PointCloud2,
    topic: /kinect2/sd/points,
    marking: true,
    clear:  true,
    max_obstacle_height: 1.5,
    min_obstacle_height: 0.2,
}


# 1. 机器人物理参数
#robot_radius: 0.25       # 机器人半径（米），用于碰撞检测
#inflation_radius: 0.5    # 障碍物膨胀半径（米），安全缓冲区，需≥机器人半径

# 2. 障碍物检测范围参数
#obstacle_range: 1.0      # 标记障碍物的最大范围（米），≤1m的障碍物会被标记
#raytrace_range: 6.0      # 清除障碍物的最大范围（米），需≥obstacle_range

# 3. 传感器数据源配置
#observation_sources: base_lidar  # 声明使用的传感器名称（base_lidar）
#base_lidar: {
#    data_type: LaserScan,  # 数据类型：激光雷达扫描数据（ROS标准消息）
#    topic: /scan,          # 数据话题：激光雷达默认话题/scan
#    marking: true,         # 启用：用该传感器标记障碍物
#    clearing: true         # 启用：用该传感器清除障碍物
#    }
